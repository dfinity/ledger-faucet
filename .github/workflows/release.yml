name: Release

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0, v2.1.3, etc.
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0, 1.0.0-beta.1)'
        required: true
        default: '1.0.0-beta.1'

env:
  DFX_VERSION: 0.28.0

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write  # Required for creating releases
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            ~/.dfx
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}-${{ env.DFX_VERSION }}

      - name: Install tools via mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:
          cache: true

      - name: Add Rust Wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install DFX
        run: |
          wget https://github.com/dfinity/sdk/releases/download/$DFX_VERSION/dfx-$DFX_VERSION-x86_64-linux.tar.gz
          tar -xzf dfx-$DFX_VERSION-x86_64-linux.tar.gz
          sudo mv dfx /usr/local/bin/dfx
          dfx --version

      - name: Build faucet
        run: |
          set -e  # Exit on any error
          mkdir -p release-artifacts

          echo "Building faucet..."
          just build
          if [ ! -f "./target/wasm32-unknown-unknown/release/backend.wasm.gz" ]; then
            echo "Error: build failed - backend.wasm.gz not found"
            exit 1
          fi
          mv ./target/wasm32-unknown-unknown/release/backend.wasm.gz ./release-artifacts/faucet.wasm.gz

          echo "Build artifacts created:"
          ls -la release-artifacts/

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Ledger Faucet Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: true
          files: |
            release-artifacts/*
          body: |
            This release contains the following artifacts:
            
            - Faucet Canister: `faucet.wasm.gz`
            
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
